services:
  casemail-imap-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./.cache:/app/.cache
    restart: unless-stopped

  greenmail:
    image: greenmail/standalone:2.1.2
    profiles: ["integration"]
    environment:
      GREENMAIL_OPTS: "-Dgreenmail.setup.test.imap -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.users=lawyer@example.com:secret"
    ports:
      - "3143:3143"

